[platformio]
default_envs = thefly
extra_configs = secure_builds.ini

[env:m5stack-core2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = m5stack-core2
framework = arduino
platform_packages =
    framework-arduinoespressif32 @ https://github.com/frank26080115/thefly-framework-arduinoespressif32-libs/releases/download/r6/framework-arduinoespressif32.zip
    framework-arduinoespressif32-libs @ https://github.com/frank26080115/thefly-framework-arduinoespressif32-libs/releases/download/r6/framework-arduinoespressif32-libs.zip

board_build.flash_size = 16MB
board_upload.flash_size = 16MB

; The device uses the Core2's 16 MB flash plus an SPI microSD card.
board_build.filesystem = littlefs

build_flags =
    -I inc    ; Headers are intentionally kept in ./inc in this repository.
    -I src/tests
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/FS/src
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Wire/src       ; solves a conflict with I2C backend versions, forces the M5 stuff to use the correct library
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src    ; might solve a build issue involving `Network.h`
    -I $PROJECT_PACKAGES_DIR/framework-espidf/components/esp_lcd/include
    -I $PROJECT_PACKAGES_DIR/framework-espidf/components/esp_adc/deprecated/include
    -I $PROJECT_PACKAGES_DIR/framework-espidf/components/bt/common/include
    -I $PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/bluedroid/common/include
    -I $PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/bluedroid/stack/include
    -DDISABLE_FS_H_WARNING    ; SdFat intentionally avoids defining File when Arduino FS.h is available.
    -DMAINTAIN_FREE_CLUSTER_COUNT=1 ; speeds up free disk space calculations
    ; HFP internal diagnostics can stall Bluedroid's own OSI task during
    ; pairing/SLC startup on this stack, leading to interrupt-WDT resets.
;    -DBTA_HF_CLIENT_AT_DUMP=1
;    -DBTA_HF_CLIENT_DEBUG=1

build_unflags =
    -Wl,--wrap=log_printf

; Keep reference-only sketches outside the firmware build while still compiling
; test sources that live under src/tests.
build_src_filter =
    +<*>
    +<tests/**>
    -<../code_for_reference/**>

extra_scripts =
    pre:tools/embed_managed_component_certs.py
    pre:tools/generate_version_source.py
    pre:tools/package_web_assets.py
    pre:tools/add_arduino_network_include.py    ; might solve a build issue involving `Network.h`
    post:tools/fix_espidf_pythonexe.py
    post:tools/check_dev_pace.py

; Use PlatformIO's deepest Library Dependency Finder mode so transitive
; includes in implementation files are discovered as the firmware grows.
lib_ldf_mode = deep+
lib_compat_mode = strict

lib_deps =
    m5stack/M5Unified @ 0.2.14
    m5stack/M5GFX @ 0.2.20
    bblanchon/ArduinoJson @ 7.4.3
    arduino-libraries/ArduinoHttpClient @ 0.6.1 ; Use with ESP32 Arduino's built-in WiFiClientSecure for HTTPS uploads.
    greiman/SdFat @ 2.3.0
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 1500000

[env:thefly]
extends = env:m5stack-core2
board = thefly-core2
build_flags =
    ${env:m5stack-core2.build_flags}
    -DCORE_DEBUG_LEVEL=ESP_LOG_ERROR
    -DLOG_LOCAL_LEVEL=ESP_LOG_ERROR
    -DDBG_LOG_LOCAL_LEVEL=DBG_LOG_ERROR
    -DDBG_LOG_USE_SERIAL=1
    ;-DRUN_BRINGUP_TEST
build_unflags =
    ${env:m5stack-core2.build_unflags}

[env:thefly_sec0]
extends = env:thefly
build_flags =
    ${env:thefly.build_flags}
    -DBUILD_WITH_SECURITY_LEVEL=0
