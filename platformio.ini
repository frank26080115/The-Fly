[platformio]
default_envs = thefly

[env:m5stack-core2]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.11/platform-espressif32.zip
board = m5stack-core2
framework = arduino

board_build.flash_size = 16MB
board_upload.flash_size = 16MB

board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS="custom_sdkconfig"

custom_sdkconfig =
    CONFIG_BT_HFP_AUDIO_DATA_PATH_HCI=y
    CONFIG_BT_HFP_AUDIO_DATA_PATH_PCM=n
    CONFIG_BTDM_CTRL_BR_EDR_SCO_DATA_PATH_HCI=y
    CONFIG_BTDM_CTRL_BR_EDR_SCO_DATA_PATH_PCM=n
    CONFIG_ESP_INSIGHTS_ENABLED=n
    ; Keep the Bluetooth host/controller near the old known-good profile.
    ; HFP is Classic-only, but the aggressive BR/EDR-only + host-pruning set
    ; caused outbound HFP connects to establish ACL and then time out before
    ; RFCOMM/SLC. Trim this again only after HFP initiation is stable.
    CONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY=n
    CONFIG_BTDM_CTRL_MODE_BTDM=y
    CONFIG_BT_BLE_ENABLED=y
    CONFIG_BT_A2DP_ENABLE=y
    CONFIG_BT_SPP_ENABLED=y
    CONFIG_BT_HFP_ENABLE=y
    CONFIG_BT_HFP_CLIENT_ENABLE=y
    CONFIG_BT_HFP_AG_ENABLE=n
    CONFIG_BT_LOG_APPL_TRACE_LEVEL=5
    CONFIG_BT_LOG_RFCOMM_TRACE_LEVEL=5
    CONFIG_BT_LOG_SDP_TRACE_LEVEL=5
    CONFIG_BTDM_CTRL_BR_EDR_MAX_ACL_CONN=2
    CONFIG_BTDM_CTRL_BR_EDR_MAX_SYNC_CONN=1
    CONFIG_BTDM_CTRL_BR_EDR_MAX_SYNC_CONN_EFF=1
    CONFIG_BT_ACL_CONNECTIONS=4
    CONFIG_BT_GATTS_ENABLE=y
    CONFIG_BT_GATTC_ENABLE=y
    CONFIG_BT_BLE_BLUFI_ENABLE=n
    CONFIG_BT_BLE_SMP_ENABLE=y
    CONFIG_BLE_MESH=n
    CONFIG_BTDM_BLE_MESH_SCAN_DUPL_EN=n
    CONFIG_BLE_MESH_SCAN_DUPLICATE_EN=n
    CONFIG_BT_MULTI_CONNECTION_ENBALE=y
    CONFIG_BT_SMP_MAX_BONDS=15
    CONFIG_BT_ALARM_MAX_NUM=50
    CONFIG_ESP32_REV_MIN_3=y
    CONFIG_ESP32_REV_MIN=3
    CONFIG_ESP32_REV_MIN_FULL=300
    CONFIG_ESP_REV_MIN_FULL=300
    CONFIG_ESPTOOLPY_FLASHSIZE_4MB=n
    CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
    CONFIG_ESPTOOLPY_FLASHSIZE="16MB"
    CONFIG_ESP_WIFI_IRAM_OPT=n
    CONFIG_ESP_WIFI_RX_IRAM_OPT=n
    CONFIG_SPI_MASTER_ISR_IN_IRAM=n
    CONFIG_SPI_SLAVE_ISR_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_WORKAROUND=n
    CONFIG_SPIRAM_CACHE_LIBCHAR_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBENV_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBFILE_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBIO_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBJMP_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBMATH_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBMEM_IN_IRAM=y
    CONFIG_SPIRAM_CACHE_LIBMISC_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBNUMPARSER_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBRAND_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBSTR_IN_IRAM=n
    CONFIG_SPIRAM_CACHE_LIBTIME_IN_IRAM=n
    CONFIG_BT_STACK_NO_LOG=n
    CONFIG_HAL_DEFAULT_ASSERTION_LEVEL=CONFIG_HAL_ASSERTION_DISABLE
    CONFIG_COMPILER_STACK_CHECK=y
    CONFIG_COMPILER_STACK_CHECK_MODE=STRONG
    CONFIG_COMPILER_STACK_CHECK_MODE_STRONG=y
    CONFIG_COMPILER_STACK_CHECK=y
    CONFIG_COMPILER_STACK_CANARY_MODE_ALL=y
    CONFIG_ESP_SYSTEM_MEMPROT_FEATURE=y
    CONFIG_ESP_SYSTEM_MEMPROT_FEATURE_LOCK=y
    CONFIG_HEAP_POISONING_LIGHT=y
    CONFIG_HEAP_TRACING_OFF=y


; The device uses the Core2's 16 MB flash plus an SPI microSD card.
board_build.filesystem = littlefs

build_flags =
    -I inc    ; Headers are intentionally kept in ./inc in this repository.
    -I src/tests
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/FS/src
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Wire/src       ; solves a conflict with I2C backend versions, forces the M5 stuff to use the correct library
    -I $PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src    ; might solve a build issue involving `Network.h`
    -I $PROJECT_PACKAGES_DIR/framework-espidf/components/esp_lcd/include
    -I $PROJECT_PACKAGES_DIR/framework-espidf/components/bt/common/include
    -I $PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/bluedroid/common/include
    -I $PROJECT_PACKAGES_DIR/framework-espidf/components/bt/host/bluedroid/stack/include
    -DDISABLE_FS_H_WARNING    ; SdFat intentionally avoids defining File when Arduino FS.h is available.
    -DBTA_HF_CLIENT_AT_DUMP=1 ; Temporary HFP SLC/AT diagnostics: show AT+BRSF/response traffic.
    -DBTA_HF_CLIENT_DEBUG=1   ; Temporary HFP client state-machine diagnostics.

build_unflags =
    -Wl,--wrap=log_printf


; Keep reference-only sketches outside the firmware build while still compiling
; test sources that live under src/tests.
build_src_filter =
    +<*>
    +<tests/**>
    -<../code_for_reference/**>

extra_scripts =
    pre:tools/embed_managed_component_certs.py
    pre:tools/generate_version_source.py
    pre:tools/package_web_assets.py
    pre:tools/add_arduino_network_include.py    ; might solve a build issue involving `Network.h`
    post:tools/fix_espidf_pythonexe.py
    post:tools/check_dev_pace.py

; Use PlatformIO's deepest Library Dependency Finder mode so transitive
; includes in implementation files are discovered as the firmware grows.
lib_ldf_mode = deep+
lib_compat_mode = strict
lib_ignore =
    EspFileManager    ; Unused dependency; compiling its embedded web UI can wedge this machine's toolchain.

lib_deps =
    m5stack/M5Unified @ 0.2.14
    m5stack/M5GFX @ 0.2.20
    bblanchon/ArduinoJson @ 7.4.3
    arduino-libraries/ArduinoHttpClient @ 0.6.1 ; Use with ESP32 Arduino's built-in WiFiClientSecure for HTTPS uploads.
    greiman/SdFat @ 2.3.0
    https://github.com/frank26080115/ESP-FTP-Server-Lib.git
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer
    https://github.com/sparkfun/SparkFun_WM8960_Arduino_Library.git#v1.0.6
    https://github.com/arslan437/EspFileManager.git#V1.0.1

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 1500000

[env:thefly]
extends = env:m5stack-core2
board = thefly-core2
build_flags =
    ${env:m5stack-core2.build_flags}
    -DCORE_DEBUG_LEVEL=ESP_LOG_DEBUG
    -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
    -DDBG_LOG_USE_ESP_IDF=1
;    -DRUN_BRINGUP_TEST
build_unflags =
    ${env:m5stack-core2.build_unflags}

[env:thefly_sec0]
extends = env:thefly
build_flags =
    ${env:thefly.build_flags}
    -DBUILD_WITH_SECURITY_LEVEL=0

[env:thefly_sec1]
extends = env:thefly
build_flags =
    ${env:thefly.build_flags}
    -DBUILD_WITH_SECURITY_LEVEL=1

[env:thefly_sec2]
extends = env:thefly
build_flags =
    ${env:thefly.build_flags}
    -DBUILD_WITH_SECURITY_LEVEL=2

[env:thefly_sec3]
extends = env:thefly
build_flags =
    ${env:thefly.build_flags}
    -DBUILD_WITH_SECURITY_LEVEL=3
